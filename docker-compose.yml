# ══════════════════════════════════════════════
# SlideTranslate - Docker Compose for VPS Deploy
# ══════════════════════════════════════════════
#
# DEPLOY:
#   1. cp .env.example .env && nano .env  (add OPENAI_API_KEY)
#   2. docker compose up -d --build
#   3. App available at http://<YOUR_IP>:8090
#   4. (Optional) Set up reverse proxy (Nginx/Caddy) for HTTPS
#
# ══════════════════════════════════════════════

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ── Backend (FastAPI + Python) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=slidetranslate
      - CORS_ORIGINS=*
    depends_on:
      - mongo
    networks:
      - app-network

  # ── Frontend (React → Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-}
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
