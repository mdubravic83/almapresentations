# ══════════════════════════════════════════════
# SlideTranslate - Docker Compose Setup
# ══════════════════════════════════════════════
#
# QUICK START:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d --build
#   3. Open http://your-server-ip in browser
#
# ══════════════════════════════════════════════

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ── Backend (FastAPI + Python) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=slidetranslate
      - CORS_ORIGINS=*
    depends_on:
      - mongo
    networks:
      - app-network

  # ── Frontend (React, built + served by Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_BACKEND_URL=
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
